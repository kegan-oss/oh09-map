  function _buildPrecinctElectionHTML(geoid, data, filterYear) {
    if (!data || !data.layers["_precinct_detail"]) return "";
    var precincts = data.layers["_precinct_detail"].precincts || {};
    var d = precincts[geoid];
    if (!d) return "";

    var html = "";

    // 2024 results
    if (d.dem_pct_2024 != null && (!filterYear || filterYear === "2024")) {
      var kaptur = d.dem_votes_2024;
      var merrin = d.rep_votes_2024;
      var pruss  = d.lib_votes_2024;
      var total  = d.total_votes_2024 || (kaptur + merrin + (pruss || 0));
      var gt = total || 1;
      html += '<div class="info-subheader">2024 Election Results</div>';
      html += '<div class="info-section">';
      if (kaptur != null) {
        html += '<div class="info-row"><span class="label">Kaptur (Dem)</span>' +
          '<span class="value">' + Utils.formatNumber(kaptur) +
          ' (' + Utils.formatPercent(kaptur / gt) + ')</span></div>';
      }
      if (merrin != null) {
        html += '<div class="info-row"><span class="label">Merrin (Rep)</span>' +
          '<span class="value">' + Utils.formatNumber(merrin) +
          ' (' + Utils.formatPercent(merrin / gt) + ')</span></div>';
      }
      if (pruss != null && pruss > 0) {
        html += '<div class="info-row"><span class="label">Pruss (Lib)</span>' +
          '<span class="value">' + Utils.formatNumber(pruss) +
          ' (' + Utils.formatPercent(pruss / gt) + ')</span></div>';
      }
      html += '</div>';
    }

    // 2022 results
    if (d.dem_pct_2022 != null && (!filterYear || filterYear === "2022")) {
      var dem22 = d.dem_votes_2022;
      var rep22 = d.rep_votes_2022;
      var tot22 = d.total_votes_2022 || (dem22 + rep22);
      var gt22 = tot22 || 1;
      html += '<div class="info-subheader">2022 Election Results</div>';
      html += '<div class="info-section">';
      if (dem22 != null) {
        html += '<div class="info-row"><span class="label">Kaptur (Dem)</span>' +
          '<span class="value">' + Utils.formatNumber(dem22) +
          ' (' + Utils.formatPercent(dem22 / gt22) + ')</span></div>';
      }
      if (rep22 != null) {
        html += '<div class="info-row"><span class="label">Maj (Rep)</span>' +
          '<span class="value">' + Utils.formatNumber(rep22) +
          ' (' + Utils.formatPercent(rep22 / gt22) + ')</span></div>';
      }
      html += '</div>';
    }

    // 2020 results (congressional, any district)
    if (d.dem_pct_2020 != null && (!filterYear || filterYear === "2020")) {
      var dem20 = d.dem_votes_2020;
      var rep20 = d.rep_votes_2020;
      var tot20 = d.total_votes_2020 || (dem20 + rep20);
      var gt20 = tot20 || 1;
      html += '<div class="info-subheader">2020 Election Results</div>';
      html += '<div class="info-section">';
      if (dem20 != null) {
        html += '<div class="info-row"><span class="label">Dem</span>' +
          '<span class="value">' + Utils.formatNumber(dem20) +
          ' (' + Utils.formatPercent(dem20 / gt20) + ')</span></div>';
      }
      if (rep20 != null) {
        html += '<div class="info-row"><span class="label">Rep</span>' +
          '<span class="value">' + Utils.formatNumber(rep20) +
          ' (' + Utils.formatPercent(rep20 / gt20) + ')</span></div>';
      }
      html += '</div>';
    }

    return html;
  }

  function _buildPrecinctRegistrationHTML(geoid, data) {
    if (!data || !data.layers["_precinct_detail"]) return "";
    var precincts = data.layers["_precinct_detail"].precincts || {};
    var d = precincts[geoid];
    if (!d || d.active_voters_2026 == null) return "";

    var active = d.active_voters_2026;
    var total = d.registered_voters_2026 || active;
    var html = '<div class="info-subheader">Voter Registration (2026)</div>';
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Active</span>' +
      '<span class="value">' + Utils.formatNumber(active) + '</span></div>';
    if (total !== active) {
      html += '<div class="info-row"><span class="label">Total Registered</span>' +
        '<span class="value">' + Utils.formatNumber(total) + '</span></div>';
    }
    var activeTotal = active || 1;
    if (d.dem_reg_2026 != null) {
      html += '<div class="info-row"><span class="label">Dem</span>' +
        '<span class="value">' + Utils.formatNumber(d.dem_reg_2026) +
        ' (' + Utils.formatPercent(d.dem_reg_2026 / activeTotal) + ')</span></div>';
    }
    if (d.rep_reg_2026 != null) {
      html += '<div class="info-row"><span class="label">Rep</span>' +
        '<span class="value">' + Utils.formatNumber(d.rep_reg_2026) +
        ' (' + Utils.formatPercent(d.rep_reg_2026 / activeTotal) + ')</span></div>';
    }
    if (d.ind_reg_2026 != null) {
      html += '<div class="info-row"><span class="label">Non-party</span>' +
        '<span class="value">' + Utils.formatNumber(d.ind_reg_2026) +
        ' (' + Utils.formatPercent(d.ind_reg_2026 / activeTotal) + ')</span></div>';
    }
    html += '</div>';
    return html;
  }

  function _buildFullPrecinctHTML(geoid, data) {
    var activeSection = _getActiveSection();
    var html = "";

    var precincts = data && data.layers["_precinct_detail"] && data.layers["_precinct_detail"].precincts || {};
    var d = precincts[geoid];
    var isLucas = d && d.county === "Lucas";
    var boundaryVersion = Layers.getBoundaryVersion && Layers.getBoundaryVersion();

    var regHTML = _buildPrecinctRegistrationHTML(geoid, data);
    if (regHTML) {
      html += _collapsible("registration", "Registration", regHTML,
        activeSection === "registration" || !activeSection);
    }

    var turnoutHTML = _buildPrecinctTurnoutHTML(geoid, data);
    if (turnoutHTML) {
      html += _collapsible("turnout", "Turnout", turnoutHTML,
        activeSection === "turnout");
    }

    var elecHTML = _buildPrecinctElectionHTML(geoid, data);
    if (elecHTML) {
      html += _collapsible("election", "Election Results", elecHTML,
        activeSection === "election");
    }

    if (isLucas && boundaryVersion === "current") {
      html += '<p class="info-placeholder" style="font-size:0.75em;margin-top:8px">' +
        '\u26a0 Viewing 2026 boundaries. Historical election data may not display for precincts that changed.</p>';
    } else if (isLucas) {
      html += '<p class="info-placeholder" style="font-size:0.75em;margin-top:8px">' +
        'Lucas County redistricted precincts in 2026. Data shown on pre-2026 boundaries.</p>';
    }

    if (!html) {
      html = '<p class="info-placeholder">No data available for this precinct.</p>';
    }
    return html;
  }

  function _clearSelectedCounty() {
    if (_selectedLayer) {
      var parent = _selectedLayer._eventParents;
      if (parent) {
        Object.values(parent).forEach(function (p) {
          if (p.resetStyle) p.resetStyle(_selectedLayer);
        });
      }
    }
    _selectedCountyId = null;
    _selectedCountyName = null;
    _selectedPrecinctId = null;
    _selectedPrecinctName = null;
    _selectedProjectId = null;
    _selectedLayer = null;
    _updateInfoTitle("OH-09 District");
    _updateInfoPanel(_buildDistrictStatsHTML());
  }

  function _clearInfoPanel() {
    var data = window.OH09 && window.OH09.data;
    if (_selectedProjectId && data && data.layers["_fed_invest_projects"]) {
      var proj = data.layers["_fed_invest_projects"].find(function (p) {
        return p.id === _selectedProjectId;
      });
      if (proj) {
        _updateInfoTitle(proj.project_name);
        _updateInfoPanel(_buildProjectDetailHTML(proj));
        return;
      }
    }
    if (_selectedPrecinctId) {
      _updateInfoTitle(_selectedPrecinctName);
      _updateInfoPanel(
        '<button class="info-back-btn">\u2190 District Overview</button>' +
        _buildFullPrecinctHTML(_selectedPrecinctId, data)
      );
      return;
    }
    if (_selectedCountyId) {
      _updateInfoTitle(_selectedCountyName);
      _updateInfoPanel(
        '<button class="info-back-btn">\u2190 District Overview</button>' +
        _buildFullCountyHTML(_selectedCountyId, data)
      );
      return;
    }
    _updateInfoTitle("OH-09 District");
    _updateInfoPanel(_buildDistrictStatsHTML());
  }

  function _buildFeatureHTML(feature) {
    var props = feature.properties || {};
    var name = props.name || props.NAME || props.precinct_name || props.GEOID || "Unknown";
    var data = window.OH09 && window.OH09.data;
    var choropleth = Layers.getActiveChoropleth();
    var id = props.GEOID || props.id;

    // City features have LSAD (legal area type) but no precinct_name
    if (props.LSAD != null && props.precinct_name == null) {
      var typeLabels = { "25": "City", "43": "Village", "57": "Town", "36": "Township" };
      var typeLabel = typeLabels[props.LSAD] || "Place";
      return '<div class="info-section"><div class="info-row">' +
        '<span class="label">Type</span><span class="value">' + typeLabel + '</span>' +
        '</div></div>';
    }

    // Precinct features have precinct_name — route to precinct-specific hover HTML
    if (props.precinct_name != null) {
      var html = '';
      if (props.county) {
        html += '<div class="info-section"><div class="info-row">' +
          '<span class="label">County</span><span class="value">' + props.county + '</span></div></div>';
      }
      if (choropleth === "turnout-2024" || choropleth === "none") {
        html += _buildPrecinctTurnoutHTML(id, data);
      } else if (choropleth.indexOf("election-") === 0) {
        var precinctHoverYear = choropleth.replace("election-", "");
        html += _buildPrecinctElectionHTML(id, data, precinctHoverYear);
      } else if (choropleth.indexOf("shift-") === 0) {
        html += _buildPrecinctShiftHTML(id, data, choropleth);
      } else if (choropleth === "registration-total") {
        html += _buildPrecinctRegistrationHTML(id, data);
      } else if (data && choropleth !== "none") {
        var dataset = data.layers[choropleth];
        var rec = dataset && dataset.precincts && dataset.precincts[id];
        if (rec) {
          html += '<div class="info-section"><div class="info-row"><span class="label">' +
            Utils.getChoroplethLabel(choropleth) + '</span>' +
            '<span class="value">' + Utils.formatValue(choropleth, rec.value) + "</span></div></div>";
        }
      }
      return html;
    }

    var html = "";

    // Population layers: show full demographic breakdown
    if (choropleth === "population-total" || choropleth === "population-density") {
      return html + _buildPopulationHTML(id, choropleth, data);
    }

    // Registration layers: show registration counts, rate, and party breakdown
    if (choropleth === "registration-total" || choropleth === "registration-rate") {
      return html + _buildRegistrationHTML(id, choropleth, data);
    }

    // Turnout layers: show both years as a comparison
    if (choropleth === "turnout-2024" || choropleth === "turnout-2022") {
      return html + _buildTurnoutHTML(id, data);
    }

    // Election layers: show only the active year on hover
    if (choropleth.indexOf("election-") === 0) {
      var hoverYear = choropleth.replace("election-", "");
      return html + _buildElectionHTML(id, data, hoverYear);
    }

    // Shift layers: show Dem% change between years
    if (choropleth.indexOf("shift-") === 0) {
      return html + _buildShiftHTML(id, data, choropleth);
    }

    if (data && choropleth !== "none") {
      var dataset = data.layers[choropleth];
      var rec = dataset && id && (
        (dataset.counties && dataset.counties[id]) ||
        (dataset.precincts && dataset.precincts[id])
      );
      if (rec) {
        html += '<div class="info-row"><span class="label">' +
          Utils.getChoroplethLabel(choropleth) + '</span>' +
          '<span class="value">' + Utils.formatValue(choropleth, rec.value) + "</span></div>";
      }
    }

    // Always show population if available and not already the active layer
    if (data && data.layers["population-total"]) {
      var popRec = data.layers["population-total"].counties &&
                   data.layers["population-total"].counties[id];
      if (popRec) {
        html += '<div class="info-row"><span class="label">Population</span>' +
          '<span class="value">' + Utils.formatNumber(popRec.value) + "</span></div>";
      }
    }

    return html;
  }

  function _buildPopulationHTML(id, choropleth, data) {
    if (!data || !data.layers["_population_detail"]) return "";
    var detail = data.layers["_population_detail"].counties &&
                 data.layers["_population_detail"].counties[id];
    if (!detail) return "";

    var html = "";

    // Headline numbers
    html += '<div class="info-section">';
    if (detail.partial_county && detail.total_2020_cd9_blocks != null) {
      html += '<div class="info-row"><span class="label">In-District (2020 Census)</span>' +
        '<span class="value">' + Utils.formatNumber(detail.total_2020_cd9_blocks) + "</span></div>";
      html += '<div class="info-row"><span class="label">Full County (ACS 2023)</span>' +
        '<span class="value">' + Utils.formatNumber(detail.total_2023_acs) + "</span></div>";
    } else {
      html += '<div class="info-row"><span class="label">ACS 2023 Estimate</span>' +
        '<span class="value">' + Utils.formatNumber(detail.total_2023_acs) + "</span></div>";
      if (detail.estimate_2023_pep != null) {
        html += '<div class="info-row"><span class="label">PEP 2023 Estimate</span>' +
          '<span class="value">' + Utils.formatNumber(detail.estimate_2023_pep) + "</span></div>";
      }
    }
    if (detail.density != null) {
      html += '<div class="info-row"><span class="label">Density</span>' +
        '<span class="value">' + Utils.formatValue("population-density", detail.density) + "</span></div>";
    }
    html += "</div>";

    // Age distribution
    if (detail.under_18_pct != null) {
      var working = detail.working_age_pct != null
        ? detail.working_age_pct
        : (1 - (detail.under_18_pct || 0) - (detail.over_65_pct || 0));
      html += '<div class="info-subheader">Age Distribution</div>';
      html += '<div class="info-section">';
      html += '<div class="info-row"><span class="label">Under 18</span>' +
        '<span class="value">' + Utils.formatPercent(detail.under_18_pct) + "</span></div>";
      html += '<div class="info-row"><span class="label">18–64</span>' +
        '<span class="value">' + Utils.formatPercent(working) + "</span></div>";
      if (detail.over_65_pct != null) {
        html += '<div class="info-row"><span class="label">65 and over</span>' +
          '<span class="value">' + Utils.formatPercent(detail.over_65_pct) + "</span></div>";
      }
      html += "</div>";
    }

    // Race / ethnicity
    if (detail.white_nh_pct != null || detail.hispanic_pct != null) {
      html += '<div class="info-subheader">Race / Ethnicity</div>';
      html += '<div class="info-section">';
      if (detail.white_nh_pct != null) {
        html += '<div class="info-row"><span class="label">White (non-Hisp)</span>' +
          '<span class="value">' + Utils.formatPercent(detail.white_nh_pct) + "</span></div>";
      }
      if (detail.hispanic_pct != null) {
        html += '<div class="info-row"><span class="label">Hispanic / Latino</span>' +
          '<span class="value">' + Utils.formatPercent(detail.hispanic_pct) + "</span></div>";
      }
      if (detail.black_pct != null) {
        html += '<div class="info-row"><span class="label">Black / African Am.</span>' +
          '<span class="value">' + Utils.formatPercent(detail.black_pct) + "</span></div>";
      }
      html += "</div>";
    }

    return html;
  }

  function _buildRegistrationHTML(id, choropleth, data) {
    if (!data || !data.layers["_registration_detail"]) return "";
    var detail = data.layers["_registration_detail"].counties &&
                 data.layers["_registration_detail"].counties[id];
    if (!detail) return '<div class="info-section"><p class="info-placeholder">No registration data.</p></div>';

    // Compute registration rate from population data
    var rate = null;
    var popDetail = data.layers["_population_detail"] &&
                    data.layers["_population_detail"].counties &&
                    data.layers["_population_detail"].counties[id];
    if (popDetail && popDetail.total_2023_acs && popDetail.under_18_pct != null &&
        detail.registered_active) {
      var vap = popDetail.total_2023_acs * (1 - popDetail.under_18_pct);
      if (vap > 0) rate = detail.registered_active / vap;
    }

    var html = "";

    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Active Registered</span>' +
      '<span class="value">' + Utils.formatNumber(detail.registered_active) + "</span></div>";
    if (detail.registered_total != null) {
      html += '<div class="info-row"><span class="label">Total Registered</span>' +
        '<span class="value">' + Utils.formatNumber(detail.registered_total) + "</span></div>";
    }
    if (rate != null) {
      html += '<div class="info-row"><span class="label">Registration Rate</span>' +
        '<span class="value">' + Utils.formatPercent(rate) + "</span></div>";
    }
    html += "</div>";

    // Party breakdown
    var hasParts = detail.dem != null || detail.rep != null || detail.other != null;
    if (hasParts) {
      var activeTotal = detail.registered_active || 1;
      html += '<div class="info-subheader">Party Registration</div>';
      html += '<div class="info-section">';
      if (detail.dem != null) {
        html += '<div class="info-row"><span class="label">Democratic</span>' +
          '<span class="value">' + Utils.formatNumber(detail.dem) +
          " (" + Utils.formatPercent(detail.dem / activeTotal) + ")</span></div>";
      }
      if (detail.rep != null) {
        html += '<div class="info-row"><span class="label">Republican</span>' +
          '<span class="value">' + Utils.formatNumber(detail.rep) +
          " (" + Utils.formatPercent(detail.rep / activeTotal) + ")</span></div>";
      }
      if (detail.other != null) {
        html += '<div class="info-row"><span class="label">Other / Non-party</span>' +
          '<span class="value">' + Utils.formatNumber(detail.other) +
          " (" + Utils.formatPercent(detail.other / activeTotal) + ")</span></div>";
      }
      html += "</div>";
    }

    if (detail.partial_county) {
      html += '<p class="info-placeholder" style="font-size:0.75em;margin-top:6px">' +
        "* Partial county — registration figures cover all of " + (detail.name || "this county") +
        ", not just the in-district portion.</p>";
    }

    return html;
  }

  function _buildTurnoutHTML(id, data) {
    if (!data || !data.layers["_turnout_detail"]) return "";
    var detail = data.layers["_turnout_detail"].counties &&
                 data.layers["_turnout_detail"].counties[id];
    if (!detail) return '<div class="info-section"><p class="info-placeholder">No turnout data.</p></div>';

    var html = "";

    html += '<div class="info-subheader">General Election Turnout</div>';
    html += '<div class="info-section">';
    if (detail.turnout_2024 != null) {
      html += '<div class="info-row"><span class="label">2024</span>' +
        '<span class="value">' + Utils.formatPercent(detail.turnout_2024) +
        " (" + Utils.formatNumber(detail.votes_2024) + ")</span></div>";
    }
    if (detail.turnout_2022 != null) {
      html += '<div class="info-row"><span class="label">2022</span>' +
        '<span class="value">' + Utils.formatPercent(detail.turnout_2022) +
        " (" + Utils.formatNumber(detail.votes_2022) + ")</span></div>";
    }
    if (detail.registered_2024 != null) {
      html += '<div class="info-row"><span class="label">Registered (2024)</span>' +
        '<span class="value">' + Utils.formatNumber(detail.registered_2024) + "</span></div>";
    }
    html += "</div>";

    if (detail.partial_county) {
      html += '<p class="info-placeholder" style="font-size:0.75em;margin-top:6px">' +
        "* Partial county — in-district portion only (Perrysburg/Rossford corridor).</p>";
    }

    return html;
  }

  function _buildElectionHTML(id, data, filterYear) {
    if (!data || !data.layers["_election_detail"]) return "";
    var detail = data.layers["_election_detail"].counties &&
                 data.layers["_election_detail"].counties[id];
    if (!detail) return '<div class="info-section"><p class="info-placeholder">No election data.</p></div>';

    var html = "";
    var years = [
      { suffix: "_2024", label: "2024", proxyKey: "proxy_race_2024" },
      { suffix: "_2022", label: "2022", proxyKey: "proxy_race_2022" },
      { suffix: "_2020", label: "2020", proxyKey: "proxy_race_2020" },
      { suffix: "_2018", label: "2018", proxyKey: "proxy_race_2018" },
      { suffix: "_2016", label: "2016", proxyKey: "proxy_race_2016" },
    ];

    if (filterYear) {
      years = years.filter(function (yr) { return yr.label === String(filterYear); });
    }

    years.forEach(function (yr) {
      var dem   = detail["dem"   + yr.suffix];
      var rep   = detail["rep"   + yr.suffix];
      var margin = detail["margin" + yr.suffix];

      if (dem == null) return;

      var lib = (yr.suffix === "_2024") ? (detail.third_party_2024 || null) : null;
      var grandTotal = dem + rep + (lib || 0);
      var gt = grandTotal || 1;

      var subheader = yr.label;
      if (detail.is_proxy && detail[yr.proxyKey]) {
        subheader += " — " + detail[yr.proxyKey] + " (proxy)";
      }

      html += '<div class="info-subheader">' + subheader + "</div>";
      html += '<div class="info-section">';
      html += '<div class="info-row"><span class="label">Dem votes</span>' +
        '<span class="value">' + Utils.formatNumber(dem) +
        " (" + Utils.formatPercent(dem / gt) + ")</span></div>";
      html += '<div class="info-row"><span class="label">Rep votes</span>' +
        '<span class="value">' + Utils.formatNumber(rep) +
        " (" + Utils.formatPercent(rep / gt) + ")</span></div>";
      if (lib != null) {
        html += '<div class="info-row"><span class="label">Third-party (LIB)</span>' +
          '<span class="value">' + Utils.formatNumber(lib) +
          " (" + Utils.formatPercent(lib / gt) + ")</span></div>";
      }
      html += '<div class="info-row"><span class="label">Total votes</span>' +
        '<span class="value">' + Utils.formatNumber(grandTotal) + "</span></div>";
      // Non-voters
      var nonVoters = detail["non_voters" + yr.suffix];
      var registered = detail["registered" + yr.suffix];
      if (nonVoters != null && registered != null) {
        html += '<div class="info-row"><span class="label">Non-voters</span>' +
          '<span class="value">' + Utils.formatNumber(nonVoters) +
          " (" + Utils.formatPercent(nonVoters / registered) + " of reg.)</span></div>";
      }
      html += "</div>";
    });

    if (!html) {
      html = '<div class="info-section"><p class="info-placeholder">No election data available.</p></div>';
    }
    return html;
  }

  function _buildShiftHTML(id, data, choropleth) {
    if (!data || !data.layers["_election_detail"]) return "";
    var detail = data.layers["_election_detail"].counties &&
                 data.layers["_election_detail"].counties[id];
    if (!detail) return "";

    var parts = choropleth.replace("shift-", "").split("-");
    var fromYear = parts[0];
    var toYear = parts[1];
    var fromPct = detail["dem_pct_" + fromYear];
    var toPct = detail["dem_pct_" + toYear];
    if (fromPct == null || toPct == null) return "";

    var shift = toPct - fromPct;
    var shiftStr = (shift >= 0 ? "+" : "") + (shift * 100).toFixed(1) + " pts";
    var color = shift >= 0 ? "#2563eb" : "#dc2626";

    var html = '<div class="info-subheader">Shift ' + fromYear + "\u2192" + toYear + "</div>";
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Dem% ' + fromYear + '</span>' +
      '<span class="value">' + Utils.formatPercent(fromPct) + "</span></div>";
    html += '<div class="info-row"><span class="label">Dem% ' + toYear + '</span>' +
      '<span class="value">' + Utils.formatPercent(toPct) + "</span></div>";
    html += '<div class="info-row"><span class="label">Shift</span>' +
      '<span class="value" style="color:' + color + '">' + shiftStr + "</span></div>";
    html += "</div>";

    // Show proxy notes for both years if applicable
    var proxyNotes = [];
    var fromProxy = detail["proxy_race_" + fromYear];
    var toProxy = detail["proxy_race_" + toYear];
    if (fromProxy) proxyNotes.push(fromYear + ": " + fromProxy);
    if (toProxy) proxyNotes.push(toYear + ": " + toProxy);
    if (proxyNotes.length > 0) {
      html += '<p class="info-placeholder" style="font-size:0.75em;margin-top:4px">' +
        "* " + proxyNotes.join("; ") + "</p>";
    }
    return html;
  }

  function _buildPrecinctShiftHTML(geoid, data, choropleth) {
    if (!data || !data.layers["_precinct_detail"]) return "";
    var precincts = data.layers["_precinct_detail"].precincts || {};
    var d = precincts[geoid];
    if (!d) return "";

    var parts = choropleth.replace("shift-", "").split("-");
    var fromYear = parts[0];
    var toYear = parts[1];
    var fromPct = d["dem_pct_" + fromYear];
    var toPct = d["dem_pct_" + toYear];

    if (fromPct == null || toPct == null) {
      return '<div class="info-section"><p class="info-placeholder">No shift data for this precinct.</p></div>';
    }

    var shift = toPct - fromPct;
    var shiftStr = (shift >= 0 ? "+" : "") + (shift * 100).toFixed(1) + " pts";
    var color = shift >= 0 ? "#2563eb" : "#dc2626";

    var html = '<div class="info-subheader">Shift ' + fromYear + "\u2192" + toYear + "</div>";
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Dem% ' + fromYear + '</span>' +
      '<span class="value">' + Utils.formatPercent(fromPct) + "</span></div>";
    html += '<div class="info-row"><span class="label">Dem% ' + toYear + '</span>' +
      '<span class="value">' + Utils.formatPercent(toPct) + "</span></div>";
    html += '<div class="info-row"><span class="label">Shift</span>' +
      '<span class="value" style="color:' + color + '">' + shiftStr + "</span></div>";
    html += "</div>";
    return html;
  }

  // ----- Event handlers -----

  function onFeatureMouseover(e) {
    var layer = e.target;

    // Highlight
    if (layer.setStyle) {
      layer.setStyle(_highlightStyle);
      if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
        layer.bringToFront();
      }
    }
    _highlighted = layer;

    var props = layer.feature.properties || {};
    var name = props.name || props.NAME || props.precinct_name || props.GEOID || "";
    _updateInfoTitle(name || "OH-09 District");
    _updateInfoPanel(_buildFeatureHTML(layer.feature));
  }

  function onFeatureMouseout(e) {
    var layer = e.target;
    if (layer.setStyle) {
      // Reset via parent GeoJSON layer
      var parent = layer._eventParents;
      if (parent) {
        Object.values(parent).forEach(function (p) {
          if (p.resetStyle) p.resetStyle(layer);
        });
      }
      // Re-apply selected style if this feature is still selected
      if (_selectedLayer && _selectedLayer === layer) {
        layer.setStyle(_selectedStyle);
      }
    }
    _highlighted = null;
    // Defer panel reset so a mouseover on an overlapping layer (e.g. city on top
    // of county) can set _highlighted first — if so, don't clear the panel.
    setTimeout(function () {
      if (_highlighted === null) {
        _clearInfoPanel();
      }
    }, 0);
  }

  function onFeatureClick(e) {
    L.DomEvent.stopPropagation(e);
    var layer = e.target;
    var props = layer.feature.properties || {};
    var name = props.name || props.NAME || props.precinct_name || props.GEOID || "Feature";
    var id = props.GEOID || props.id;
    var isPrecinct = props.precinct_name != null;

    // Reset previously selected feature style
    if (_selectedLayer && _selectedLayer !== layer) {
      var prevParent = _selectedLayer._eventParents;
      if (prevParent) {
        Object.values(prevParent).forEach(function (p) {
          if (p.resetStyle) p.resetStyle(_selectedLayer);
        });
      }
    }

    // Set selection state — clear project selection when clicking a polygon
    _selectedProjectId = null;
    if (isPrecinct) {
      _selectedPrecinctId = id;
      _selectedPrecinctName = name + (props.county ? " \u2014 " + props.county : "");
      _selectedCountyId = null;
      _selectedCountyName = null;
    } else {
      _selectedCountyId = id;
      _selectedCountyName = name;
      _selectedPrecinctId = null;
      _selectedPrecinctName = null;
    }
    _selectedLayer = layer;
    layer.setStyle(_selectedStyle);

    // Zoom to feature
    _map.fitBounds(layer.getBounds(), { padding: [30, 30] });

    // Show detail in info card
    _updateInfoTitle(name);
    _clearInfoPanel();
  }

  // ----- Federal investment: project interactions -----

  function onProjectMouseover(e) {
    var marker = e.target;
    marker.setStyle({ weight: 3, color: "#f59e0b", fillOpacity: 0.95 });
    _highlighted = marker;
    _updateInfoTitle(marker._fedProject.project_name);
    _updateInfoPanel(_buildProjectHoverHTML(marker._fedProject));
  }

  function onProjectMouseout(e) {
    var marker = e.target;
    var proj = marker._fedProject;
    var isRescinded = proj.status === "Rescinded";
    var isAtRisk = proj.status && proj.status.indexOf("At Risk") === 0;
    marker.setStyle({
      weight: isRescinded ? 2 : 1,
      color: isRescinded ? "#d32f2f" : "#fff",
      fillOpacity: isRescinded ? 0.4 : (isAtRisk ? 0.6 : 0.75),
    });
    _highlighted = null;
    setTimeout(function () {
      if (_highlighted === null) _clearInfoPanel();
    }, 0);
  }

  function onProjectClick(e) {
    L.DomEvent.stopPropagation(e);
    var marker = e.target;
    var proj = marker._fedProject;
    // Clear any polygon selection
    if (_selectedLayer) {
      var prevParent = _selectedLayer._eventParents;
      if (prevParent) {
        Object.values(prevParent).forEach(function (p) {
          if (p.resetStyle) p.resetStyle(_selectedLayer);
        });
      }
    }
    _selectedCountyId = null;
    _selectedCountyName = null;
    _selectedPrecinctId = null;
    _selectedPrecinctName = null;
    _selectedLayer = null;
    _selectedProjectId = proj.id;
    _updateInfoTitle(proj.project_name);
    _updateInfoPanel(_buildProjectDetailHTML(proj));
  }

  function _buildProjectHoverHTML(proj) {
    var isRescinded = proj.status === "Rescinded";
    var isAtRisk = proj.status && proj.status.indexOf("At Risk") === 0;
    var html = '';
    if (isRescinded) {
      html += '<div class="fed-invest-rescinded-badge">RESCINDED</div>';
    } else if (isAtRisk) {
      html += '<div class="fed-invest-atrisk-badge">AT RISK</div>';
    }
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Amount</span>' +
      '<span class="value">' + Utils.formatDollars(proj.amount) + "</span></div>";
    if (proj.amount == null && proj.amount_note) {
      html += '<div class="info-note">' + proj.amount_note + "</div>";
    }
    html += '<div class="info-row"><span class="label">Category</span>' +
      '<span class="value">' + proj.category.replace(" — RESCINDED", "") + "</span></div>";
    html += '<div class="info-row"><span class="label">Location</span>' +
      '<span class="value">' + proj.city + ", " + proj.county + " Co.</span></div>";
    html += '<div class="info-row"><span class="label">Status</span>' +
      '<span class="value">' + proj.status + "</span></div>";
    html += "</div>";
    return html;
  }

  function _buildProjectDetailHTML(proj) {
    var isRescinded = proj.status === "Rescinded";
    var isAtRisk = proj.status && proj.status.indexOf("At Risk") === 0;
    var html = '<button class="info-back-btn">\u2190 District Overview</button>';

    if (isRescinded) {
      html += '<div class="fed-invest-rescinded-banner">' +
        "<strong>RESCINDED</strong> \u2014 Cancelled by Trump administration";
      if (proj.clawback_date) html += " (" + proj.clawback_date + ")";
      if (proj.clawback_authority) html += "<br>Authority: " + proj.clawback_authority;
      html += "</div>";
    } else if (isAtRisk) {
      html += '<div class="fed-invest-atrisk-banner">' +
        "<strong>AT RISK</strong> \u2014 Status needs verification</div>";
    }

    html += '<div class="info-section-divider">Funding</div>';
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Amount</span>' +
      '<span class="value">' + Utils.formatDollars(proj.amount) + "</span></div>";
    if (proj.amount == null && proj.amount_note) {
      html += '<div class="info-note">' + proj.amount_note + "</div>";
    }
    html += '<div class="info-row"><span class="label">Program</span>' +
      '<span class="value">' + proj.program + "</span></div>";
    html += '<div class="info-row"><span class="label">Fiscal Year</span>' +
      '<span class="value">' + proj.fiscal_year + "</span></div>";
    html += '<div class="info-row"><span class="label">Status</span>' +
      '<span class="value">' + proj.status + "</span></div>";
    html += "</div>";

    html += '<div class="info-section-divider">Location</div>';
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">City</span>' +
      '<span class="value">' + proj.city + "</span></div>";
    html += '<div class="info-row"><span class="label">County</span>' +
      '<span class="value">' + proj.county + "</span></div>";
    html += "</div>";

    html += '<div class="info-section-divider">Rep. Kaptur Connection</div>';
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Role</span>' +
      '<span class="value">' + proj.kaptur_connection + "</span></div>";
    html += "</div>";

    if (proj.description) {
      html += '<div class="info-section-divider">Description</div>';
      html += '<div class="info-section"><p style="font-size:12px;line-height:1.5;color:#475569">' +
        proj.description + "</p></div>";
    }

    if (proj.source_url) {
      html += '<div style="margin-top:8px">';
      html += '<a href="' + proj.source_url + '" target="_blank" rel="noopener" ' +
        'style="color:#0d9488;font-size:12px">Source \u2197</a>';
      html += "</div>";
    }

    if (proj.needs_verification) {
      html += '<div class="info-note" style="margin-top:6px">' +
        "\u26a0 This project has details that need verification.</div>";
    }

    return html;
  }

  // ----- Federal investment: district and county panels -----

  function _buildDistrictFedInvestHTML(data) {
    if (!data || !data.layers["_fed_invest_detail"]) return "";
    var raw = data.layers["_fed_invest_detail"];
    var meta = raw._metadata || {};
    var counties = raw.counties || {};
    var projects = raw.projects || [];

    var statusCounts = {};
    var rescindedTotal = 0;
    projects.forEach(function (p) {
      var s = p.status || "Unknown";
      statusCounts[s] = (statusCounts[s] || 0) + 1;
      if (s === "Rescinded" && p.amount) rescindedTotal += p.amount;
    });

    var html = '<div class="info-subheader">District Investment Summary</div>';
    html += '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Total Projects</span>' +
      '<span class="value">' + Utils.formatNumber(meta.total_projects || projects.length) + "</span></div>";
    html += '<div class="info-row"><span class="label">Est. Total</span>' +
      '<span class="value">' + Utils.formatDollars(meta.total_estimated_dollars) + "</span></div>";
    html += '<div class="info-row"><span class="label">Counties</span>' +
      '<span class="value">' + (meta.counties_covered || Object.keys(counties).length) + "</span></div>";
    if (rescindedTotal > 0) {
      html += '<div class="info-row"><span class="label" style="color:#dc2626">Rescinded</span>' +
        '<span class="value" style="color:#dc2626">' + Utils.formatDollars(rescindedTotal) + "</span></div>";
    }
    html += "</div>";

    // Status breakdown
    html += '<div class="info-subheader">By Status</div>';
    html += '<div class="info-section">';
    ["Awarded", "Active", "Under Construction", "Complete", "Rescinded", "At Risk \u2014 verify"].forEach(function (s) {
      if (statusCounts[s]) {
        var style = s === "Rescinded" ? ' style="color:#dc2626"' : "";
        html += '<div class="info-row"><span class="label">' + s + "</span>" +
          '<span class="value"' + style + ">" + statusCounts[s] + "</span></div>";
      }
    });
    html += "</div>";

    // Top counties
    html += '<div class="info-subheader">Top Counties</div>';
    html += '<div class="info-section">';
    var sorted = Object.entries(counties).sort(function (a, b) {
      return (b[1].total_estimated || 0) - (a[1].total_estimated || 0);
    });
    sorted.slice(0, 5).forEach(function (entry) {
      html += '<div class="info-row"><span class="label">' + entry[0] + "</span>" +
        '<span class="value">' + Utils.formatDollars(entry[1].total_estimated) +
        " (" + entry[1].project_count + ")</span></div>";
    });
    html += "</div>";

    return html;
  }

  function _buildRestOfOhioHTML(data) {
    if (!data || !data.layers["_fed_invest_detail"]) return "";
    var raw = data.layers["_fed_invest_detail"];
    var roh = raw.rest_of_ohio;
    var clawback = raw.clawback_context;
    if (!roh) return "";

    var html = '<div class="info-section-divider" style="cursor:pointer" ' +
      'onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">' +
      "Statewide Impact \u25BC</div>";
    html += '<div class="fed-invest-roh-section">';

    // Topline
    if (roh.total_estimated_dollars) {
      html += '<div class="info-section">';
      html += '<div class="info-row"><span class="label">Ohio Total (all laws)</span>' +
        '<span class="value">' + Utils.formatDollars(roh.total_estimated_dollars) + "</span></div>";
      html += "</div>";
    }

    // Key projects
    var rohProjects = roh.projects || [];
    if (rohProjects.length > 0) {
      html += '<div class="info-subheader">Key Ohio Investments</div>';
      html += '<div class="info-section">';
      rohProjects.forEach(function (p) {
        var statusTag = "";
        if (p.status === "Rescinded") statusTag = ' <span style="color:#dc2626;font-size:10px">[RESCINDED]</span>';
        else if (p.status === "Cancelled") statusTag = ' <span style="color:#dc2626;font-size:10px">[CANCELLED]</span>';
        else if (p.status === "At_Risk") statusTag = ' <span style="color:#d97706;font-size:10px">[AT RISK]</span>';
        html += '<div class="info-row" style="flex-wrap:wrap"><span class="label" style="flex:1;white-space:normal;min-width:120px">' +
          p.project_name + statusTag + "</span>" +
          '<span class="value" style="min-width:60px;text-align:right">' +
          Utils.formatDollars(p.amount) + "</span></div>";
      });
      html += "</div>";
    }

    // Clawback summary
    if (clawback) {
      html += '<div class="info-subheader">Funding Threatened</div>';
      html += '<div class="info-section">';
      if (clawback.oh09_confirmed_rescinded) {
        html += '<div class="info-row"><span class="label" style="color:#dc2626">OH-09 Rescinded</span>' +
          '<span class="value" style="color:#dc2626">' +
          Utils.formatDollars(clawback.oh09_confirmed_rescinded) + "</span></div>";
      }
      if (clawback.oh09_at_risk) {
        html += '<div class="info-row"><span class="label" style="color:#d97706">OH-09 At Risk</span>' +
          '<span class="value" style="color:#d97706">' +
          Utils.formatDollars(clawback.oh09_at_risk) + "</span></div>";
      }
      if (roh.cancelled_rescinded_total) {
        html += '<div class="info-row"><span class="label" style="color:#dc2626">Rest of Ohio Lost</span>' +
          '<span class="value" style="color:#dc2626">' +
          Utils.formatDollars(roh.cancelled_rescinded_total) + "</span></div>";
      }
      if (roh.at_risk_total) {
        html += '<div class="info-row"><span class="label" style="color:#d97706">Rest of Ohio At Risk</span>' +
          '<span class="value" style="color:#d97706">' +
          Utils.formatDollars(roh.at_risk_total) + "</span></div>";
      }
      // OBBBA Ohio impact (One Big Beautiful Bill Act)
      if (clawback.obbba_ohio_impact && clawback.obbba_ohio_impact.ohio_confirmed_obbba_total) {
        html += '<div class="info-row" style="margin-top:4px"><span class="label" style="color:#dc2626;font-size:11px">' +
          'OBBBA Ohio Total</span><span class="value" style="color:#dc2626">' +
          Utils.formatDollars(clawback.obbba_ohio_impact.ohio_confirmed_obbba_total) + "</span></div>";
        html += '<div style="font-size:10px;color:#64748b;margin-top:2px">' +
          clawback.obbba_ohio_impact.note + "</div>";
      }
      html += "</div>";
    }

    html += "</div>";
    return html;
  }

  function _buildCountyFedInvestHTML(id, data) {
    if (!data || !data.layers["_fed_invest_detail"]) return "";
    var raw = data.layers["_fed_invest_detail"];
    var countyName = null;
    var countyData = null;
    Object.keys(raw.counties || {}).forEach(function (name) {
      if (raw.counties[name].fips === id) {
        countyName = name;
        countyData = raw.counties[name];
      }
    });
    if (!countyData) return "";

    var projects = (raw.projects || []).filter(function (p) { return p.county === countyName; });
    var html = '<div class="info-section">';
    html += '<div class="info-row"><span class="label">Total Estimated</span>' +
      '<span class="value">' + Utils.formatDollars(countyData.total_estimated) + "</span></div>";
    html += '<div class="info-row"><span class="label">Projects</span>' +
      '<span class="value">' + countyData.project_count + "</span></div>";
    html += "</div>";

    if (projects.length > 0) {
      html += '<div class="info-subheader">Projects</div>';
      projects.sort(function (a, b) { return (b.amount || 0) - (a.amount || 0); });
      projects.slice(0, 8).forEach(function (p) {
        var statusTag = p.status === "Rescinded"
          ? ' <span style="color:#dc2626;font-size:10px">[RESCINDED]</span>' : "";
        html += '<div class="info-row" style="flex-wrap:wrap"><span class="label" style="flex:1;white-space:normal;min-width:120px">' +
          p.project_name + statusTag + "</span>" +
          '<span class="value" style="min-width:60px;text-align:right">' +
          Utils.formatDollars(p.amount) + "</span></div>";
      });
      if (projects.length > 8) {
        html += '<div class="info-row"><span class="label" style="font-style:italic">+' +
          (projects.length - 8) + " more projects</span></div>";
      }
    }

    return html;
  }

  // ----- Public API -----

  function init(map) {
    _map = map;
    _clearInfoPanel();

    // Deselect county when clicking the map background
    _map.on("click", _clearSelectedCounty);

    // Delegated handler for back button and collapsible toggles inside #info-card-body
    var cardBody = document.getElementById("info-card-body");
    if (cardBody) {
      cardBody.addEventListener("click", function (e) {
        if (e.target.closest(".info-back-btn")) {
          _clearSelectedCounty();
          return;
        }
        var toggle = e.target.closest(".info-collapsible-toggle");
        if (toggle) {
          var wrap = toggle.parentElement;
          var body = toggle.nextElementSibling;
          if (wrap && body) {
            var isOpen = wrap.classList.toggle("open");
            body.style.display = isOpen ? "block" : "none";
          }
        }
      });
    }

    // Info card close button returns to district overview
    var closeBtn = document.getElementById("info-card-close");
    if (closeBtn) {
      closeBtn.addEventListener("click", function () {
        _clearSelectedCounty();
      });
    }

    // Control panel collapse toggle
    var toggleBtn = document.getElementById("control-panel-toggle");
    var panelBody = document.getElementById("control-panel-body");
    var panelHeader = document.getElementById("control-panel-header");
    if (toggleBtn && panelBody) {
      var toggle = function () {
        var isCollapsed = panelBody.classList.toggle("collapsed");
        toggleBtn.classList.toggle("collapsed", isCollapsed);
        toggleBtn.setAttribute("aria-expanded", !isCollapsed);
      };
      toggleBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        toggle();
      });
      panelHeader.addEventListener("click", toggle);
    }
  }

  function refreshDistrictPanel() {
    if (!_selectedCountyId) {
      _updateInfoPanel(_buildDistrictStatsHTML());
    }
  }

  return {
    init: init,
    onFeatureMouseover: onFeatureMouseover,
    onFeatureMouseout: onFeatureMouseout,
    onFeatureClick: onFeatureClick,
    onProjectMouseover: onProjectMouseover,
    onProjectMouseout: onProjectMouseout,
    onProjectClick: onProjectClick,
    refreshDistrictPanel: refreshDistrictPanel,
  };
})();

  </script>

  const TILE_ATTR =
    '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

  // Initialize map
  const map = L.map("map", {
    center: MAP_CENTER,
    zoom: MAP_ZOOM,
    zoomControl: true,
  });

  L.tileLayer(TILE_URL, {
    attribution: TILE_ATTR,
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);

  // Expose globally for other modules
  window.OH09 = window.OH09 || {};
  window.OH09.map = map;

  // Boot sequence: load data, then render layers
  DataLoader.loadAll().then(function (data) {
    window.OH09.data = data;
    Layers.init(map, data);
    Interactions.init(map);
  }).catch(function (err) {
    console.error("Failed to load map data:", err);
  });
})();

  </script>
</body>
